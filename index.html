<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>For My Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(135deg,#ff9ecf,#ff4fa3,#ff1493);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    position:relative;
}

/* MAIN CONTAINER */

.container{
    z-index:10;
    padding:30px;
    width:100%;
    max-width:1200px;
}

/* TITLES */

h1{
    font-size:3rem;
    margin-bottom:15px;
    text-shadow:0 0 15px rgba(0,0,0,0.25);
    animation:pulse 2s infinite;
}

p{
    font-size:1.2rem;
    margin-bottom:30px;
}

/* BUTTONS */

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

button{
    border:none;
    padding:16px 36px;
    border-radius:60px;
    font-size:1.2rem;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

/* YES BUTTON */

#yesBtn{
    background:white;
    color:#ff1493;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

#yesBtn:hover{
    transform:scale(1.1);
}

/* NO BUTTON */

#noBtn{
    background:#222;
    color:white;
    position:absolute;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* FLOWERS */

.flower{
    position:absolute;
    top:-20px;
    font-size:28px;
    animation:fall linear forwards;
    pointer-events:none;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}

/* PULSE */

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
    100%{
        transform:scale(1);
    }
}

/* HIDDEN */

.hidden{
    display:none;
}

/* FIREWORKS */

.firework{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    animation:explode 1s ease-out forwards;
}

@keyframes explode{
    from{
        transform:scale(1);
        opacity:1;
    }

    to{
        transform:translate(var(--x), var(--y)) scale(0);
        opacity:0;
    }
}

/* NEXT BUTTON */

#nextBtn{
    margin-top:20px;
    background:white;
    color:#ff1493;
}

/* KIDS GALLERY */

.kids-gallery{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:20px;
}

.kid-card{
    width:200px;
    background:rgba(255,255,255,0.15);
    padding:15px;
    border-radius:25px;
    backdrop-filter:blur(12px);
    animation:float 2s infinite alternate;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.kid-card img{
    width:100%;
    height:240px;
    object-fit:cover;
    border-radius:20px;
    border:4px solid white;
}

.kid-card h2{
    margin-top:12px;
    font-size:1.3rem;
}

@keyframes float{
    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-12px);
    }
}

.ending-text{
    margin-top:35px;
    font-size:1.2rem;
    font-weight:600;
}

/* MOBILE */

@media(max-width:768px){

    h1{
        font-size:2.1rem;
    }

    p{
        font-size:1rem;
    }

    .kid-card{
        width:160px;
    }

    .kid-card img{
        height:190px;
    }

}

</style>
</head>

<body>

<!-- PAGE 1 -->

<div class="container" id="proposalPage">

    <h1>I Love You Babe ❤️</h1>

    <p>Will You Marry Me? 💍</p>

    <div class="buttons">

        <button id="yesBtn">
            YES 😍
        </button>

        <button id="noBtn">
            NO 😡
        </button>

    </div>

</div>

<!-- PAGE 2 -->

<div class="container hidden" id="acceptedPage">

    <h1>THANK YOU FOR ACCEPTING MY PROPOSAL ❤️</h1>

    <p>
        You just made me the happiest person alive 💖
    </p>

    <button id="nextBtn">
        NEXT ➜
    </button>

</div>

<!-- PAGE 3 -->

<div class="container hidden" id="futurePage">

    <h1>Our Future Together ❤️</h1>

    <p>
        Tiny versions of us 😭💖
    </p>

    <div class="kids-gallery">

        <div class="kid-card">

            <img src="https://images.unsplash.com/photo-1519345182560-3f2917c472ef?q=80&w=800&auto=format&fit=crop">

            <h2>Aurora ✨</h2>

        </div>

        <div class="kid-card">

            <img src="https://images.unsplash.com/photo-1516627145497-ae6968895b74?q=80&w=800&auto=format&fit=crop">

            <h2>Franco 😎</h2>

        </div>

        <div class="kid-card">

            <img src="https://images.unsplash.com/photo-1503919545889-aef636e10ad4?q=80&w=800&auto=format&fit=crop">

            <h2>Ngim 🌸</h2>

        </div>

        <div class="kid-card">

            <img src="https://images.unsplash.com/photo-1514090458221-65bb69cf63e6?q=80&w=800&auto=format&fit=crop">

            <h2>Nimii 🧸</h2>

        </div>

    </div>

    <p class="ending-text">
        Our house gonna be loud, chaotic, cute, and full of love forever ❤️
    </p>

</div>

<script>

/* BUTTONS */

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const nextBtn = document.getElementById("nextBtn");

/* PAGES */

const proposalPage = document.getElementById("proposalPage");
const acceptedPage = document.getElementById("acceptedPage");
const futurePage = document.getElementById("futurePage");

/* MOVE NO BUTTON */

function moveButton(){

    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;

}

noBtn.addEventListener("mouseenter", moveButton);

noBtn.addEventListener("click", moveButton);

/* FLOWERS */

function createFlowers(){

    setInterval(() => {

        const flower = document.createElement("div");

        flower.classList.add("flower");

        const flowers = ["🌸","🌹","💖","🌺","💕","🌷"];

        flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];

        flower.style.left = Math.random() * window.innerWidth + "px";

        flower.style.animationDuration =
            (Math.random() * 3 + 2) + "s";

        document.body.appendChild(flower);

        setTimeout(() => {

            flower.remove();

        },5000);

    },180);

}

/* FIREWORKS */

function createFireworks(){

    for(let i=0;i<35;i++){

        const firework = document.createElement("div");

        firework.classList.add("firework");

        firework.style.background =
            `hsl(${Math.random()*360},100%,50%)`;

        firework.style.left =
            window.innerWidth / 2 + "px";

        firework.style.top =
            window.innerHeight / 2 + "px";

        firework.style.setProperty(
            '--x',
            `${(Math.random()-0.5)*700}px`
        );

        firework.style.setProperty(
            '--y',
            `${(Math.random()-0.5)*700}px`
        );

        document.body.appendChild(firework);

        setTimeout(() => {

            firework.remove();

        },1000);

    }

}

/* YES CLICK */

yesBtn.addEventListener("click", () => {

    proposalPage.classList.add("hidden");

    acceptedPage.classList.remove("hidden");

    createFlowers();

    setInterval(createFireworks,900);

});

/* NEXT BUTTON */

nextBtn.addEventListener("click", () => {

    acceptedPage.classList.add("hidden");

    futurePage.classList.remove("hidden");

});

/* INITIAL */

moveButton();

</script>

</body>
</html>
